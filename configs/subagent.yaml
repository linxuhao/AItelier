# configs/subagent.yaml
# GATED generalist sub-agent: a spawned worker does the task the driver hands it,
# then TWO gates check the result and loop it back until both pass (bounded):
#   1. an OBJECTIVE test gate (run_tests) — deterministic, can't be sweet-talked;
#   2. an adversarial RED reviewer — for scope/correctness the tests don't cover.
# This is the Green/Red pattern applied to a generic task — it lets even a cheap
# worker converge to a reviewed result, all in the spawned agents' own context
# (never the driver's).
#
# The test gate runs FIRST (cheap, deterministic): if the change breaks the
# suite, it loops straight back to work with the failing report — the reviewer,
# which has no way to execute code, never had to catch that. On a repo with no
# runnable tests run_tests reports passed=True (skip), so a test-less task is
# unaffected. The red gate is only as good as the reviewer: the review role is
# prompted to REFUTE, and the worker's context includes the last verdict AND the
# last test_report so it fixes the named problems. Bounded by max_loop on each
# loop-back edge; on the pass path (test green → review passes) the run ends.
# Needs skillflow-py >= 1.5.2 (max_loop on a tool-fed gate edge).

name: "subagent"
description: "Gated generalist worker: do a task, red-review + fix loop, until it passes"

x-aitelier:
  label: "Sub-agent (gated)"
  scheduler_owned: true           # spawned agents, context isolated
  seed_file: "task.md"
  output_step: "review"
  input_hint: >-
    seed_text = a self-contained task to carry out (implement X, refactor Y).
    Add against_project=<repo> to work in an existing repo. A spawned worker
    does it, then two gates loop it back with feedback until both pass (max 3
    tries each): an objective test gate (run_tests — skipped on a repo with no
    runnable tests) then an adversarial reviewer. The result is committed. Poll
    to completion; read the final verdict + summary. For a pure "make the tests
    pass" task with no design judgement needed, fix_tests is leaner (test gate
    only, no reviewer).

begin: "work"

end_conditions:
  combinator: or
  conditions:
    # Terminate at the loop-EXTERNAL `done` gate, reached only when the review
    # passes (review → done). node_reached must NOT be `review`: it's inside the
    # loop, so a stale `completed` review row from a prior (failed) iteration
    # would fire node_reached and end the run before the fixed work is reviewed
    # (the premature-firing trap proven in coding_impl). `done` is a gate (no
    # completed row), reached at most once. The never-passes loop is bounded by
    # max_loop:3 below.
    - type: node_reached
      node: "done"
      result: "completed"
    - type: max_total_steps
      limit: 60

steps:
  - id: "work"
    step_type: "agent"
    agent_config: "subagent_worker"
    timeout_seconds: 600
    context:
      - source: { from: "repository", mode: "tool" }
      - source: { config: "subagent", output: "task.md" }
      - source: { step: "test" }          # on loop-back: the failing test_report
      - source: { step: "review" }        # on loop-back: the reviewer's feedback
      - source: { tool: "dir_tree" }
    output:
      mode: "write"                        # surgical create/edit
    lifecycle:
      on_deliver:
        - tool: "repo_apply"
          params:
            source_dir: "$STEP_DIR"
          on_failure: "retry"
          max_retries: 3
    transitions:
      - to: "test"

  # Objective gate — run the suite on the worker's committed change BEFORE the
  # LLM reviewer sees it. A test-breaking change loops straight back to work
  # (the reviewer can't execute code, so it never had to catch this). On a repo
  # with no runnable tests run_tests reports passed=True, so this is a no-op
  # there. Mirrors the fix_tests gate.
  - id: "test"
    step_type: "tool"
    tool_name: "run_tests"
    timeout_seconds: 1200
    tool_params:
      out_dir: "$STEP_DIR"
    transitions:
      - to: "review"                       # tests green → adversarial review
        match: { from_file: "test_report.json", field: "passed", value: true }
      - to: "work"                         # tests red → fix, with the report
        match: { from_file: "test_report.json", field: "passed", value: false }
        max_loop: 3

  - id: "review"
    step_type: "agent"
    agent_config: "subagent_reviewer"
    timeout_seconds: 300
    context:
      - source: { from: "repository", mode: "tool" }
      - source: { config: "subagent", output: "task.md" }
      - source: { step: "work" }
      - source: { tool: "dir_tree" }
    output:
      mode: "content"
      fixed:
        verdict: { file: "review_verdict.json", on_exists: "new", format: '{"passed": bool, "feedback": str, "findings": [str, ...]}' }
    validation:
      - files: ["review_verdict.json"]
        tool: "json_schema"
        inline_schema:
          type: object
          required: [passed]
          properties:
            passed: { type: boolean }
            feedback: { type: string }
    transitions:
      - to: "done"                          # passed → loop-external terminal
        match: { from_file: "review_verdict.json", field: "passed", value: true }
      - to: "work"                          # failed → fix, with the feedback
        match: { from_file: "review_verdict.json", field: "passed", value: false }
        max_loop: 3

  # Loop-external terminal — reached only after the review passes; the node the
  # end-condition fires on. Gate = no completed step row, so it fires at most once.
  - id: "done"
    step_type: "gate"
    transitions:
      - to: null
