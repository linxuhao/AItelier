# docker-compose.yml — AItelier backend + web UI in Docker.
#
#   docker compose up -d        # build (first run) + start
#   docker compose ps           # status
#   docker compose logs -f      # tail logs
#   docker compose down         # stop
#
# The CLI (`aitelier`) drives this automatically: it starts the backend if the
# container is down and reuses it if it is already running (see cli/server.py).
#
# State is the host's ~/.AItelier, mounted at the SAME absolute path inside the
# container (${HOME}/.AItelier) so DB + workspace paths match the host CLI.

services:
  aitelier:
    build:
      context: .
      args:
        # Derived from the invoking shell so paths/ownership match the host user.
        HOME_DIR: ${HOME}
        APP_UID: ${AITELIER_UID:-1000}
        APP_GID: ${AITELIER_GID:-1000}
    image: aitelier:latest
    container_name: aitelier
    # Run as the host user → files written into ~/.AItelier keep host ownership.
    user: "${AITELIER_UID:-1000}:${AITELIER_GID:-1000}"
    environment:
      # Path.home() resolves from HOME on POSIX → keep it == the host home dir.
      HOME: ${HOME}
      # Requests reach the container via the Docker bridge / Cloudflare tunnel,
      # never 127.0.0.1, so the app-level localhost guard must be relaxed.
      # Put Cloudflare Access (or equivalent auth) in front of the published port.
      AITELIER_ALLOW_EXTERNAL: "1"
      # Git auth for clone/push of GitHub repos. The credential helper feeds the
      # GITHUB_TOKEN secret (below) to github.com HTTPS remotes only — the token
      # stays in the secret file, only the helper *path* is in the environment.
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: "credential.helper"
      GIT_CONFIG_VALUE_0: "/app/docker/git-credential-helper.sh"
      # C#/Unity projects: the `csharp` lint backend POSTs source dirs here for a
      # license-free semantic compile. Python projects never call it.
      UNITY_BUILDER_URL: "http://unity-builder:8080"
    env_file:
      - .env
    secrets:
      # LLM API key delivered as a file (mounted at /run/secrets/DEEPSEEK_API_KEY),
      # NOT an env var → test/build subprocesses that inherit os.environ never see
      # it. ai_router._read_secret() reads it. Source lives outside any mounted
      # path so it isn't visible in the workspace tree.
      - DEEPSEEK_API_KEY
      # GitHub token (fine-grained PAT) for private clone + push + PR creation.
      # Same file-secret model as the LLM key: read by git-credential-helper.sh
      # (clone/push) and core/git_ops.py (PR REST call), never placed in env.
      - GITHUB_TOKEN
    volumes:
      # Live source: host repo shadows the baked-in copy (no rebuild on edits).
      - .:/app
      # Shared state at the identical absolute path the code expects.
      - ${HOME}/.AItelier:${HOME}/.AItelier
    networks:
      # Own network (default) + the gateway/cloudflared network so a single
      # cloudflared connector resolves http://aitelier:4444 by service name.
      - default
      - edge
    ports:
      # Loopback-only: the host CLI uses localhost:4444; the public path is via
      # cloudflared over the 'edge' network (aitelier:4444). Binding to 0.0.0.0
      # would let any LAN client reach the backend directly, bypassing Cloudflare.
      - "127.0.0.1:4444:4444"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4444/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Unity builder sidecar ──────────────────────────────────────────────────
  # License-free semantic compile of generated Unity C# (editor Roslyn + Unity
  # reference assemblies behind a tiny HTTP service). Reached only by C# projects
  # at http://unity-builder:8080. ~5GB editor image — built lazily; pull/build is
  # skipped for Python-only deployments that never start this service.
  unity-builder:
    build:
      context: .
      dockerfile: Dockerfile.unity
    image: aitelier-unity:latest
    container_name: aitelier-unity
    # Same host user → can read the host-owned workspace files it compiles.
    user: "${AITELIER_UID:-1000}:${AITELIER_GID:-1000}"
    environment:
      PORT: "8080"
    volumes:
      # Read-only view of the workspace at the IDENTICAL absolute path the main
      # container uses, so a project_dir passed over HTTP resolves the same here.
      - ${HOME}/.AItelier:${HOME}/.AItelier:ro
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Cloudflare ────────────────────────────────────────────────────────────
  # An existing cloudflared connector (on the 'edge' network below) reaches this
  # backend by service name. In the Cloudflare Zero Trust dashboard add a public
  # hostname (a dedicated subdomain — NOT a path, the SPA uses absolute /web and
  # /api paths) pointing at:  http://aitelier:4444

secrets:
  # LLM API key, kept out of the environment. Source is outside any path
  # bind-mounted into the container (not ~/.AItelier, not the repo).
  #   mkdir -p ~/.aitelier-secrets && chmod 700 ~/.aitelier-secrets
  #   printf '%s' "$DEEPSEEK_KEY" > ~/.aitelier-secrets/DEEPSEEK_API_KEY && chmod 600 "$_"
  DEEPSEEK_API_KEY:
    file: ${HOME}/.aitelier-secrets/DEEPSEEK_API_KEY
  # GitHub fine-grained PAT — scope to the repos you push to (Contents: R/W,
  # Pull requests: R/W). Create the file before `up` (may be empty to start;
  # the helper treats an empty file as "no credentials"):
  #   printf '%s' "$GH_PAT" > ~/.aitelier-secrets/GITHUB_TOKEN && chmod 600 "$_"
  GITHUB_TOKEN:
    file: ${HOME}/.aitelier-secrets/GITHUB_TOKEN

networks:
  # The backend's own private network.
  default:
  # Pre-existing network shared with the cloudflared connector + api gateway,
  # so a single connector can route to this service. Create/rename as needed:
  #   docker network ls   → confirm the name
  edge:
    external: true
    name: vip-gateway_default
