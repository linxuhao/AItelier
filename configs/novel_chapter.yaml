# configs/novel_chapter.yaml — 网文章节循环（一次 run = 一章，B 精修）
#
# probe（tool）在图头：查 bible 存在（缺失→响亮报错，先跑 novel_init）、算下一章
# 章号、并把整本 bible + 滚动摘要 + 上章结尾打包进 novel_context.md（它的 step
# 输出）。novel/ 树住在 code repo（可下载+git），skillflow 原生 context 读不到
# code repo，所以由 probe 这个确定性工具把 bible 桥进 prompt，agent 用
# {step: probe} 读到（原生 context、不烧 turn、不做 mention 选卡——整本小 bible
# 全给）。
#
# 章循环：
#   probe(tool) → outline(章纲：读 probe bundle 做完整规划)
#   → outline_review(Red) → outline_gate(CP#1 人讨论：restage 显示 Red 已审章纲)
#   → draft(整章成文)
#   → draft_review(Red 审【未润色初稿】的实质：OOC/战力/时间线/章纲忠实, fail 回 draft)
#   → humanize(独立去AI味——只润已过审的稿, 不做无用功)
#   → continuity(确定性硬gate：字数/元标记/套话密度 + 对照初稿的保真三条, fail 回 humanize)
#   → humanize_review(Red 保真对照：除了语言还有别的变了吗, fail 回 humanize)
#   → finalize(提取记账分录) → finalize_review(Red 审计分录 vs 正文：虚报节点/漏记/
#     hint≠resolve, fail 回 finalize) → final_gate(CP#2: 终稿+分录+审计一屏人批)
#   → apply_state(记账+对账+git commit)。
# 先审实质、后润色（同真人作者：先改结构/情节，再抠语言）——绝不在有硬伤的稿上白润一遍。
#
# 细纲(arc_plan)与章纲(outline)在 per-chapter 精修下重复，已合并进 outline；
# 长线方向由 bible/compass.md 提供。

name: "novel_chapter"
description: "网文章节循环：probe 装配上下文 → 章纲/正文/去AI味/双审/记账"

anchors:
  writer: "draft"              # 题材包可替换正文写手
  pre_review: "continuity"     # 追加机检 gate 的接入边
  reviewer: "draft_review"     # 题材包可替换评审卡

# Host (AItelier) metadata — read by core/config_registry.py, ignored by skillflow.
x-aitelier:
  label: "Novel Chapter"
  scheduler_owned: true
  output_step: "finalize"
  input_hint: >-
    对一个已运行过 novel_init 的项目写下一章（无需 seed；写哪一章由图头 probe
    自动算）。每章两个 checkpoint：章纲讨论（reject+反馈=改章纲）与终稿+状态变更
    确认（reject+反馈=正文返工重走全链）。
  labels:
    probe: "上下文装配"
    outline: "章纲"
    outline_review: "章纲审查 (Red)"
    outline_gate: "章纲人工讨论"
    draft: "正文"
    humanize: "去AI味润色"
    continuity: "一致性硬门槛"
    humanize_review: "润色保真对照 (Red)"
    draft_review: "正文审查 (Red)"
    finalize: "摘要与记账分录"
    finalize_review: "记账审计 (Red)"
    final_gate: "终稿人工终审"
    apply_state: "记账入册"

begin: "probe"

end_conditions:
  combinator: or
  conditions:
    - type: node_reached
      node: "apply_state"
      result: "completed"
      require_completed: true   # 章节必须真实入册，本 run 才算完成

steps:
  # ── 图头：查 bible + 算章号 + 打包上下文（bible bundle）────────────────────
  - id: "probe"
    step_type: "tool"
    tool_name: "state_probe"
    tool_params:
      out_dir: "$STEP_DIR"
    transitions:
      - to: "outline"

  # ── 章纲（读 probe bundle 做完整规划）─────────────────────────────────────
  # 顺序同 novel_init：outline → outline_review(Red) →〔过〕→ outline_gate(CP#1
  # 人讨论) →〔批〕→ draft。Red 先审、人工后批：outline↔outline_review 自主循环到
  # Red 满意，人工只在 Red-clean 时被叫一次（不在每圈重修里被打扰）。
  - id: "outline"
    step_type: "agent"
    agent_config: "novel_outliner"
    timeout_seconds: 600
    context:
      - source: { step: "probe" }            # 整本 bible + 上章结尾 + 滚动摘要
      - source: { step: "outline" }          # 上一版章纲（修订时保留未被指出的部分，防打地鼠）
      - source: { step: "outline_review" }   # Red 驳回意见（首轮为空）
      # 记账库按需读面：novel/state/index.yaml（反向索引：人物/地点/节点/伏笔→章号）
      # 定位，novel/chapters/chNNNN/{events.yaml,summary.md} 取账。probe 包只给
      # 余额两点（初始→现在）；要查"王老在哪几章/蜂巢发生过什么"用这里的 read/search。
      - source: { from: "repository", mode: "tool" }
    output:
      mode: "content"
      fixed:
        outline: "chapter_outline.md"
    validation:
      - files: ["chapter_outline.md"]
        tool: "file_exists"
    # NO checkpoint here — Red reviews first, the human gates at outline_gate.
    transitions:
      - to: "outline_review"

  - id: "outline_review"
    step_type: "agent"
    agent_config: "novel_outline_reviewer"
    timeout_seconds: 300
    context:
      - source: { step: "probe" }
      - source: { step: "outline" }
      - source: { step: "outline_review" }   # Red 驳回意见（首轮为空）
      - source: { feedback_of: "outline" }   # 用户历轮 checkpoint 反馈——守护者：任何一轮被回退即打回
    output:
      mode: "content"
      fixed:
        verdict: { file: "review_verdict.json", on_exists: "new", format: '{"passed": bool, "feedback": str, "suggestions": [str, ...]}' }
    validation:
      - files: ["review_verdict.json"]
        tool: "json_schema"
        inline_schema:
          type: object
          required: [passed]
          properties:
            passed: { type: boolean }
            feedback: { type: string }
    transitions:
      - to: "outline_gate"                                # Red 过 → 人工讨论
        match: { from_file: "review_verdict.json", field: "passed", value: true }
      - to: "outline"                                     # Red 驳回 → 自主重修（不惊动人工）
        match: { from_file: "review_verdict.json", field: "passed", value: false }
        max_loop: 3

  # ── 章纲人工讨论（Red 通过后才到这；CP#1）─────────────────────────────────
  # restage 把 outline 的章纲 + outline_review 的裁决摆进本步目录，弹窗显示 Red 已
  # 审过的章纲（+建议）。reject → outline 改章纲。章纲不进 code repo（每章临时产物），
  # 故从 step 目录拷（outline 是 content 单文件，每轮全量重写，目录里就是完整章纲）。
  - id: "outline_gate"
    step_type: "tool"
    tool_name: "restage"
    tool_params:
      from_steps: ["outline", "outline_review"]
      out_dir: "$STEP_DIR"
    checkpoint: true
    checkpoint_label: "章纲讨论（Red 已通过；reject+反馈=改章纲，approve=开写正文）"
    checkpoint_reject_to: "outline"
    transitions:
      - to: "draft"
        match: { from: "checkpoint", value: "approved" }

  - id: "draft"
    step_type: "agent"
    agent_config: "novel_writer"
    timeout_seconds: 900
    context:
      - source: { step: "probe" }            # 上章结尾/角色卡/节奏约定
      - source: { step: "outline" }
      - source: { step: "draft" }            # 上一版正文（修订时保留未被指出的段落，防打地鼠）
      - source: { step: "draft_review" }     # Red 驳回意见（首轮为空）
      # 记账库按需读面（同 outline）：写到旧地点/旧配角时，用 index.yaml 反查该
      # 实体的历史章号，再读对应章的 events/summary 保持一致。
      - source: { from: "repository", mode: "tool" }
    output:
      mode: "content"
      fixed:
        draft: "chapter_draft.md"
    validation:
      - files: ["chapter_draft.md"]
        tool: "file_exists"
    transitions:
      - to: "draft_review"

  # ── Red 正文审查（审的是【未润色初稿】的实质：设定/角色/章纲/叙事/节奏/钩子）──
  # 先审实质、后润色：故事有硬伤先打回重写，绝不在有硬伤的稿子上浪费一遍去AI味。
  # 审美/AI味不在这里做阻塞判断——那是 humanize 去 + continuity 机检 + CP#2 人审的事。
  - id: "draft_review"
    step_type: "agent"
    agent_config: "novel_chapter_reviewer"
    timeout_seconds: 600
    context:
      - source: { step: "probe" }
      - source: { step: "outline" }
      - source: { step: "draft" }            # 审初稿（未润色）
      - source: { feedback_of: "draft" }     # 用户对正文的历轮反馈（CP#2 reject 回 draft）——守护不回退
    output:
      mode: "content"
      fixed:
        verdict: { file: "review_verdict.json", on_exists: "new", format: '{"passed": bool, "feedback": str, "suggestions": [str, ...]}' }
    validation:
      - files: ["review_verdict.json"]
        tool: "json_schema"
        inline_schema:
          type: object
          required: [passed]
          properties:
            passed: { type: boolean }
            feedback: { type: string }
    transitions:
      - to: "humanize"                                    # 实质过审 → 去AI味
        match: { from_file: "review_verdict.json", field: "passed", value: true }
      - to: "draft"                                       # 硬伤 → 重写（不浪费 humanize）
        match: { from_file: "review_verdict.json", field: "passed", value: false }
        max_loop: 3

  # ── 去AI味润色（只对已过实质审查的初稿润色，不做无用功）────────────────────
  - id: "humanize"
    step_type: "agent"
    agent_config: "novel_humanizer"
    timeout_seconds: 600
    context:
      - source: { step: "draft" }            # 实质已过审的初稿（润色基底）
      - source: { step: "humanize" }         # 上一版润色（continuity 打回时保留、只修违规处）
      - source: { step: "continuity" }       # 机检违规清单（首轮为空）
      - source: { step: "humanize_review" }  # 保真对照的驳回证据（首轮为空）
    output:
      mode: "content"
      fixed:
        final: "chapter_final.md"
    validation:
      - files: ["chapter_final.md"]
        tool: "file_exists"
    transitions:
      - to: "continuity"

  # ── 确定性硬门槛（机械项：字数/元标记/套话密度——去AI味的机检地板；语义归 Red）──
  - id: "continuity"
    step_type: "tool"
    tool_name: "continuity_check"
    tool_params:
      out_dir: "$STEP_DIR"
    transitions:
      - to: "humanize_review"
        match: { passed: true }
      - to: "humanize"                        # 套话超标 → 重润（AI味是 humanize 的活，不重写）
        match: { passed: false }
        max_loop: 2
        feedback: true       # 违规清单注入 humanize 重润

  # ── 润色保真对照（Red，窄）────────────────────────────────────────────────
  # 交付链缺口：Red 批的是 draft，读者拿到的是 chapter_final，中间没人核对过两者
  # 是不是同一个故事。humanize 整篇重发（create_final）物理上想改哪都行，而机检只
  # 数得动标题/字数/段落——改个数字、换个人说话、把钩子补完，机器全看不见，CP#2 的
  # 人手里也没有初稿可对照。这一步只回答一个问题：除了语言，还有别的变了吗。
  # 用 flash：这是 A/B 对照不是创作判断。范围必须窄（不复审质量，Red 已批过初稿），
  # 且必须两边引原文举证——否则它会退化成又一个假阳性门槛。
  # 放在 continuity 之后：便宜的机械门槛先拦（fail-fast）。
  - id: "humanize_review"
    step_type: "agent"
    agent_config: "novel_humanize_reviewer"
    timeout_seconds: 300
    context:
      - source: { step: "draft" }             # 基准：已过 Red 实质审查的初稿
      - source: { step: "humanize" }          # 待查：润色终稿
    output:
      mode: "content"
      fixed:
        verdict: { file: "review_verdict.json", on_exists: "new", format: '{"passed": bool, "feedback": str, "suggestions": [str, ...]}' }
    validation:
      - files: ["review_verdict.json"]
        tool: "json_schema"
        inline_schema:
          type: object
          required: [passed]
          properties:
            passed: { type: boolean }
            feedback: { type: string }
    transitions:
      - to: "finalize"
        match: { from_file: "review_verdict.json", field: "passed", value: true }
      - to: "humanize"                        # 改了剧情 → 拿着对照证据回去重润
        match: { from_file: "review_verdict.json", field: "passed", value: false }
        max_loop: 2

  # ── 记账分录提取 + 终稿人批 ───────────────────────────────────────────────
  - id: "finalize"
    step_type: "agent"
    agent_config: "novel_finalizer"
    timeout_seconds: 300
    context:
      - source: { step: "probe" }
      - source: { step: "outline" }
      - source: { step: "humanize" }
    output:
      mode: "content"
      fixed:
        events:
          file: "chapter_events.json"
          # Tier-1 per-field write args (see novel_init design step rationale).
          format: '{"chapter": int, "title": str, "summary": str, "events": [{}], "appearances": [{}], "locations": [str], "thread_updates": [{}], "arc_updates": [{}]}'
    validation:
      - files: ["chapter_events.json"]
        tool: "json_schema"
        inline_schema:
          type: object
          required: [chapter, title, summary, events, appearances,
                     thread_updates, arc_updates]
          properties:
            chapter: { type: integer, minimum: 1 }
            title: { type: string, minLength: 1 }
            summary: { type: string, minLength: 10 }
            events:
              type: array
              items:
                type: object
                required: [entity_type, entity_name, changes, reason]
                properties:
                  entity_type: { type: string, enum: [character, protagonist, faction, world_setting] }
                  entity_name: { type: string, minLength: 1 }
                  create: { type: boolean }
                  changes: { type: object }
                  reason: { type: string }
            appearances:
              type: array
              items:
                type: object
                required: [name]
                properties:
                  name: { type: string, minLength: 1 }
                  importance: { type: integer }
            locations:
              # 反向索引锚点（by_location）：本章实际发生场景的具名地点。
              # 非 required —— 老分录没有它；缺失时索引里该章地点为空即可。
              type: array
              items: { type: string, minLength: 1 }
            thread_updates:
              type: array
              items:
                type: object
                required: [name, action]
                properties:
                  name: { type: string, minLength: 1 }
                  action: { type: string, enum: [hint, resolve, register, abandon] }
                  detail: { type: string }
            arc_updates:
              # 节点驱动：本章完成了哪些剧情节点（可为空数组=推进中未完成）。
              # 全部节点完成时 apply_state 自动把 arc 标 completed。
              type: array
              items:
                type: object
                required: [name, nodes_completed]
                properties:
                  name: { type: string, minLength: 1 }
                  nodes_completed:
                    type: array
                    items: { type: string }
                  notes: { type: string }
    # NO checkpoint here — the journal gets a Red audit first (finalize_review),
    # the human gates at final_gate. Same review-before-checkpoint order as
    # outline_gate / design_gate.
    transitions:
      - to: "finalize_review"

  # ── Red 记账审计（分录 vs 正文的忠实性；入册前最后一道专业审查）────────────
  # 分录一旦 apply_state 入册就永久固化（改余额/推节点/动伏笔），且此前没有任何
  # agent 审过它——虚报节点/漏记状态/hint记成resolve 都会在数章后以吃书显形。
  - id: "finalize_review"
    step_type: "agent"
    agent_config: "novel_finalize_reviewer"
    timeout_seconds: 300
    context:
      - source: { step: "probe" }            # 当前状态（对照：变更是否真的是变更）
      - source: { step: "outline" }          # 章纲的节点推进声明（对照虚报）
      - source: { step: "humanize" }         # 终稿正文（真相源）
      - source: { step: "finalize" }         # 被审计的分录
    output:
      mode: "content"
      fixed:
        verdict: { file: "review_verdict.json", on_exists: "new", format: '{"passed": bool, "feedback": str, "suggestions": [str, ...]}' }
    validation:
      - files: ["review_verdict.json"]
        tool: "json_schema"
        inline_schema:
          type: object
          required: [passed]
          properties:
            passed: { type: boolean }
            feedback: { type: string }
    transitions:
      - to: "final_gate"                                  # 审计过 → 人工终审
        match: { from_file: "review_verdict.json", field: "passed", value: true }
      - to: "finalize"                                    # 分录有误 → 重记（正文不动）
        match: { from_file: "review_verdict.json", field: "passed", value: false }
        max_loop: 2

  # ── 终稿人工终审（Red 审计通过后才到这；CP#2）──────────────────────────────
  # restage 摆出：终稿正文 + 记账分录 + 审计裁决，一屏批完。
  # reject → draft：正文返工重走全链（反馈累积到 _feedback/draft.md，draft 与
  # draft_review 的 feedback_of 都读得到）。
  - id: "final_gate"
    step_type: "tool"
    tool_name: "restage"
    tool_params:
      from_steps: ["humanize", "finalize", "finalize_review"]
      out_dir: "$STEP_DIR"
    checkpoint: true
    checkpoint_label: "终稿与状态变更确认（Red 已审计分录；reject+反馈=正文返工重走全链）"
    checkpoint_reject_to: "draft"
    transitions:
      - to: "apply_state"
        match: { from: "checkpoint", value: "approved" }

  - id: "apply_state"
    step_type: "tool"
    tool_name: "apply_state"
    tool_params:
      out_dir: "$STEP_DIR"
    transitions:
      - to: null            # node_reached end-condition completes the run
