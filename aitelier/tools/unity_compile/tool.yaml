name: unity_compile
description: >
  Semantic-compile every *.cs in the consolidated repo together (against Unity's
  reference assemblies, via the unity-builder sidecar) and write
  compile_report.json {passed, returncode, file_count, errors, summary}. THEN, if
  compilation passed, chain a PlayMode smoke test (unity_playtest) and write
  playtest_report.json; if compile failed or it's not a C# project, write a
  'skipped' playtest_report instead (no point running the editor on code that
  didn't compile). Always succeeds as a step; no-ops for non-C# projects and
  degrades to pass if the builder is unreachable/unlicensed. Both outcomes are
  captured for the verifier to act on.
parameters:
  project_root:
    type: string
    description: "Path to the project repo (auto-injected by the engine)"
    required: false
  out_dir:
    type: string
    description: "Directory to write compile_report.json + playtest_report.json (set to $STEP_DIR)"
    required: false
