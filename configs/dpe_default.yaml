# configs/dpe_default.yaml — v2 graph config
# All agents (research, architect, PM, tasks, final verify) are explicit nodes.
# Reviewers are separate nodes with loop-back transitions on fail.
# Tool nodes (repo_apply, repo_validate) handle code integration.

name: "dpe_default_v2"
description: "AItelier DPE: Research → Architect → PM → Task Loop → Verify"

# ── Addon anchors (skillflow.compose) ───────────────────────────────────────
# This base graph is ENGINE-AGNOSTIC — no game/Unity/Godot steps or prompts. It
# just publishes named extension points (anchors). Addons bind to THIS base by
# name (their `base:` field) and splice in at these anchors; compose the runnable
# combo with `run(base, [addons])` or a boot-registered alias (e.g. the
# game_harness addon → `dpe_game`). See core/addon_registry.py. Games route to
# the composed config; non-game runs use this clean base.
anchors:
  post_verify_tests: "5_test"   # the edge out of the deterministic test gate
  verifier_review: "5_review"   # the final verifier/reviewer

# Host (AItelier) metadata — read by core/config_registry.py, ignored by skillflow.
x-aitelier:
  label: "DPE Pipeline"
  scheduler_owned: true           # driven by the polling scheduler
  has_task_loop: true             # PM produces a task manifest → per-task loop
  seed_file: "project_brief.md"
  output_step: "5"
  preamble_steps: ["1", "2"]      # SOTA + architecture: project-global stable
                                  # docs hoisted into the shared system preamble
  labels:                         # step_id → dashboard label (source of truth)
    git_sync_pre: "Sync Repo"
    "1": "Researcher"
    "1_review": "Research Review"
    "2": "Architect"
    "2_review": "Architecture Review"
    "3": "PM"
    "3_review": "PM Review"
    task_loop: "Task Loop"
    t_plan: "Task Planner"
    t_plan_review: "Plan Review"
    t_impl: "Implementer"
    t_impl_review: "Impl Review"
    "5": "Final Verifier"
    "5_test": "Final Tests"
    "5_knowledge": "Knowledge Sync"
    "5_review": "Final Review"

begin: "git_sync_pre"

end_conditions:
  combinator: or
  conditions:
    - type: node_reached
      node: "5_review"    # end after final verifier review passes
      result: "completed"
      require_completed: true  # AT-2: must actually execute before triggering
    - type: max_total_steps
      limit: 200
    # No wall-clock run cap: AItelier is single-instance and human-in-the-loop,
    # so a run may sit paused on a checkpoint indefinitely. max_run_duration_seconds
    # counted approval-wait time (started_at is stamped once and never adjusted for
    # paused state), so a run approved after a long wait failed instantly on resume.
    # Runaways are already bounded by max_total_steps + per-step timeout_seconds +
    # the scheduler's hung-step detection.
    - type: flag_match
      flag:
        fatal_error: true

steps:
  # ─── Pre-flight: git sync ───
  - id: "git_sync_pre"
    step_type: "tool"
    tool_name: "git_sync_pre"
    tool_params:
      project_root: "$PROJECT_ROOT"
    transitions:
      - to: "1"
        match: { synced: true }

  # ─── Research ───
  - id: "1"
    step_type: "agent"
    agent_config: "researcher"
    timeout_seconds: 300
    context:
      - source: { from: "repository", mode: "tool" }
      # Cross-run memory: distilled, review-verified knowledge left by prior DPE
      # runs on THIS repo (git-ignored, absent on the first run). Carries design
      # rationale + known pitfalls so we build on past wisdom without re-deriving
      # it. Treat its "known issues" as things to avoid; verify any file/symbol it
      # names still exists before relying on it (it reflects a past run's state).
      - source: { from: "repository", path: ".aitelier/knowledge.md", mode: "tool" }
      - source: { config: "meta_conversation", step: "finalize", output: "step1_goals.json" }
      - source: { tool: "dir_tree" }
    output:
      mode: "content"
      fixed:
        sota: "step1_sota.md"
    validation:
      - files: ["step1_sota.md"]
        tool: "file_exists"
    checkpoint: true
    checkpoint_label: "SOTA / Codebase Analysis Review"
    transitions:
      - to: "1_review"
        match: { from: "checkpoint", value: "approved" }

  - id: "1_review"
    step_type: "agent"
    agent_config: "researcher_reviewer"
    timeout_seconds: 180
    context:
      - source: { from: "repository", mode: "tool" }
      - source: { step: "1" }
    output:
      mode: "content"
      fixed:
        verdict: { file: "review_verdict.json", on_exists: "new", format: '{"passed": bool, "feedback": str, "suggestions": [str, ...]}' }
    validation:
      - files: ["review_verdict.json"]
        tool: "json_schema"
        inline_schema:
          type: object
          required: [passed]
          properties:
            passed: { type: boolean }
            feedback: { type: string }
            suggestions: { type: array, items: { type: string } }
    transitions:
      - to: "2"
        match: { from_file: "review_verdict.json", field: "passed", value: true }
      - to: "1"
        match: { from_file: "review_verdict.json", field: "passed", value: false }
        max_loop: 3

  # ─── Architect ───
  - id: "2"
    step_type: "agent"
    agent_config: "architect"
    timeout_seconds: 300
    context:
      - source: { from: "repository", mode: "tool" }
      - source: { step: "1" }
      - source: { step: "2_review" }
      - source: { tool: "dir_tree" }
    output:
      mode: "content"
      fixed:
        design: "step2_design.md"
        linter_manifest: "linter_manifest.json"
    validation:
      - files: ["step2_design.md"]
        tool: "file_exists"
    lifecycle:
      on_deliver:
        tool: "repo_apply"
        params:
          source_dir: "$STEP_DIR"
        on_failure: "skip"
    checkpoint: true
    checkpoint_label: "Architecture Review"
    transitions:
      - to: "2_review"
        match: { from: "checkpoint", value: "approved" }

  - id: "2_review"
    step_type: "agent"
    agent_config: "architect_reviewer"
    timeout_seconds: 180
    context:
      - source: { from: "repository", mode: "tool" }
      - source: { step: "2" }
    output:
      mode: "content"
      fixed:
        verdict: { file: "review_verdict.json", on_exists: "new", format: '{"passed": bool, "feedback": str, "suggestions": [str, ...]}' }
    validation:
      - files: ["review_verdict.json"]
        tool: "json_schema"
        inline_schema:
          type: object
          required: [passed]
          properties:
            passed: { type: boolean }
            feedback: { type: string }
    transitions:
      - to: "3"
        match: { from_file: "review_verdict.json", field: "passed", value: true }
      - to: "2"
        match: { from_file: "review_verdict.json", field: "passed", value: false }
        max_loop: 3

  # ─── PM ───
  - id: "3"
    step_type: "agent"
    agent_config: "pm"
    timeout_seconds: 300
    max_retries: 3
    max_tool_turns: 20
    context:
      - source: { from: "repository", mode: "tool" }
      - source: { step: "1" }
      - source: { step: "2" }
      - source: { step: "3_review" }
      # Goal-loop inputs (empty on the first pass; present when 5_review loops
      # back here): PM's own prior manifest, the final verifier output, the
      # review verdict (the actual pass/fail feedback the PM must address), and
      # test failures. Without 5_review the PM can't see WHAT failed, so it can't
      # author a targeted fix-task — it just re-lists completed tasks (skipped).
      - source: { step: "3" }
      - source: { step: "5" }
      - source: { step: "5_review" }
      - source: { step: "5_test" }
      - source: { tool: "dir_tree" }
    output:
      mode: "content"
      fixed:
        tasks_manifest: { file: "tasks_manifest.json", format: '{"execution_order": [[str, ...], ...]}' }
        task_card: { file: "tasks/*.json", format: '{"id": str, "description": "ONE-LINE summary (max 80 chars)", "detailed_requirements": str, "artifact_requirement": str, "dependencies": [str, ...], "task_type": str, "interface_contract": str}' }
    validation:
      - files: ["tasks_manifest.json"]
        tool: "file_exists"
    # SF-4: removed json_schema validation — LLM-generated JSON format varies;
    # strict schema causes infinite retry loops when validation fails on each
    # attempt. file_exists is sufficient; the reviewer (3_review) catches issues.
    checkpoint: true
    checkpoint_label: "Review Task Breakdown"
    transitions:
      - to: "3_review"
        match: { from: "checkpoint", value: "approved" }
      - to: "task_loop"
        match: { _error: true }

  - id: "3_review"
    step_type: "agent"
    agent_config: "pm_reviewer"
    timeout_seconds: 180
    context:
      - source: { from: "repository", mode: "tool" }
      - source: { step: "3" }
      # Goal-loop: the verifier's verdict the PM was supposed to fix. Lets the
      # reviewer check each reported issue has a NEW fix-task (empty first pass).
      - source: { step: "5_review" }
    output:
      mode: "content"
      fixed:
        verdict: { file: "review_verdict.json", on_exists: "new", format: '{"passed": bool, "feedback": str, "suggestions": [str, ...]}' }
    validation:
      - files: ["review_verdict.json"]
        tool: "json_schema"
        inline_schema:
          type: object
          required: [passed]
          properties:
            passed: { type: boolean }
            feedback: { type: string }
    transitions:
      - to: "task_loop"
        match: { from_file: "review_verdict.json", field: "passed", value: true }
      - to: "3"
        match: { from_file: "review_verdict.json", field: "passed", value: false }
        max_loop: 3

  # ─── Task Loop ───
  - id: "task_loop"
    step_type: "loop"
    loop:
      source:
        step: "3"
        file: "tasks_manifest.json"
        field: "execution_order"
      item_as: "current_task"
      max_iterations: 200
    transitions:
      - to: "t_plan"
        max_loop: 200
      - to: "5"

  # ─── Task Plan ───
  - id: "t_plan"
    step_type: "agent"
    agent_config: "task_planner"
    # Bound a stuck/conflicting loop-body claim so it times out cleanly instead
    # of churning (defense-in-depth for the loop-progression fix).
    timeout_seconds: 300
    context:
      # The current task being planned — resolved from the task_loop item
      # (current_task) so each iteration is scoped to its own task card.
      - source: { from: "repository", mode: "tool" }
      - source: { step: "3", file: "tasks/$current_task.json" }
      - source: { step: "1", mode: "summary" }
      - source: { step: "2", mode: "interfaces" }
      - source: { step: "t_plan_review" }
      - source: { tool: "dir_tree" }
    output:
      mode: "content"
      fixed:
        plan: "task_plan.md"
        subtask_manifest: { file: "subtasks_manifest.json", format: '{"subtasks": [subtask, ...], "execution_order": [[str, ...], ...]}' }
        subtask_card: { file: "subtasks/*.json", format: '{"id": str, "description": str, "dependencies": [str, ...], "artifact_requirement": str, "interface_contract": str}' }
        research_notes: { file: "research_notes.md", format: "Literal external references the implementer needs but cannot look up (it has no web access): exact API signatures, import paths, config keys, and version-specific gotchas for any third-party/unfamiliar library this task uses. Use web_fetch on the official docs and record the verbatim signatures — NOT prose summaries. If the task only uses the standard library or already-known APIs, write a single line: 'No external references needed.'" }
    transitions:
      - to: "t_plan_review"

  - id: "t_plan_review"
    step_type: "agent"
    agent_config: "task_planner_reviewer"
    context:
      - source: { from: "repository", mode: "tool" }
      - source: { step: "t_plan" }
    output:
      mode: "content"
      fixed:
        verdict: { file: "review_verdict.json", on_exists: "new", format: '{"passed": bool, "feedback": str, "suggestions": [str, ...]}' }
    transitions:
      - to: "t_impl"
        match: { from_file: "review_verdict.json", field: "passed", value: true }
      - to: "t_plan"
        match: { from_file: "review_verdict.json", field: "passed", value: false }
        max_loop: 3

  # ─── Task Implement → Review ───
  # Lifecycle hooks:
  #   after_validate → step_commit (built-in default, tmp→step_dir)
  #   on_deliver     → repo_apply (step_dir→project repo)
  #   after_deliver  → lint (project checks, per-extension backends)
  - id: "t_impl"
    step_type: "agent"
    agent_config: "task_implementer"
    # Bound a stuck/conflicting loop-body claim so it times out cleanly instead
    # of churning (defense-in-depth for the loop-progression fix).
    timeout_seconds: 300
    context:
      - source: { from: "repository", mode: "tool" }
      - source: { step: "3", file: "tasks/$current_task.json" }
      - source: { step: "2", mode: "interfaces" }
      - source: { step: "t_plan" }
      - source: { step: "t_impl" }
      - source: { step: "t_impl_review" }
      - source: { tool: "dir_tree" }
    output:
      mode: "write"
    validation:
      - files: ["*.py"]
        tool: "lint"
        workspace_root: "$STEP_DIR"
        manifest_path: "linter_manifest.json"
    lifecycle:
      # on_deliver is a SEQUENCE of repo-mutating tool hooks, run in order with
      # full variable resolution (needs skillflow-py >= 1.4.1). repo_apply
      # adds/updates the step's files (ignoring the deletions manifest, so it
      # never reaches the repo); repo_delete then reads _deletions.json from
      # $STEP_DIR and git-rm's + commits the files the agent queued via
      # delete_file. No-op when nothing was queued.
      # (repo_delete cannot live in after_deliver: that path runs through
      # StepValidator, which neither resolves $STEP_DIR nor unwraps `params`.)
      on_deliver:
        - tool: "repo_apply"
          params:
            source_dir: "$STEP_DIR"
            ignore: ["_deletions.json"]
          on_failure: "retry"
          max_retries: 3
        - tool: "repo_delete"
          params:
            source_dir: "$STEP_DIR"
          # retry (not warn): a commit failure rolls back the staged git rm's and
          # keeps the manifest, so an in-place retry re-attempts from a clean tree
          # instead of advancing with a half-applied, uncommitted deletion.
          on_failure: "retry"
          max_retries: 2
      after_deliver:
        # Lint the post-apply, post-deletion tree.
        - tool: "lint"
          files: ["**/*.py"]
          workspace_root: "$STEP_DIR"
          manifest_path: "linter_manifest.json"
          on_failure: "retry"
          max_retries: 3
        - tool: "lint"
          files: ["**/*.js", "**/*.html", "**/*.css"]
          workspace_root: "$STEP_DIR"
          manifest_path: "linter_manifest.json"
          on_failure: "warn"
    transitions:
      - to: "t_impl_review"

  - id: "t_impl_review"
    step_type: "agent"
    agent_config: "task_implementer_reviewer"
    context:
      - source: { from: "repository", mode: "tool" }
      - source: { step: "2", mode: "interfaces" }
      - source: { step: "t_plan" }
      - source: { step: "t_impl" }
      - source: { tool: "dir_tree" }
    output:
      mode: "content"
      fixed:
        verdict: { file: "review_verdict.json", on_exists: "new", format: '{"passed": bool, "feedback": str, "suggestions": [str, ...]}' }
    transitions:
      - to: "task_loop"
        match: { from_file: "review_verdict.json", field: "passed", value: true }
      - to: "t_impl"
        match: { from_file: "review_verdict.json", field: "passed", value: false }
        max_loop: 3

  # ─── Final Verify ───
  - id: "5"
    step_type: "agent"
    agent_config: "final_verifier"
    context:
      - source: { from: "repository", mode: "tool" }
      - source: { step: "1" }
      - source: { step: "2" }
      - source: { step: "5_review" }
      # Goals delivered by skillflow context from the meta run's surviving copy
      # (DPE step-1 promotion wipes any copy placed in dpe_default_v2/1/).
      - source: { config: "meta_conversation", step: "finalize", output: "step1_goals.json" }
      - source: { tool: "dir_tree" }
    output:
      mode: "content"
      fixed:
        report: { file: "final/verify_report.json", format: '{"all_goals_met": bool, "verified_subtasks": [str, ...], "issues": [str, ...], "ready_for_deploy": bool}' }
    # The verifier owns project documentation, but NOT via content-mode output:
    # steps 3/5 have no on_deliver:repo_apply, so a staged README.md would never
    # reach the delivered repo. Instead it uses the readme_* agent tools below,
    # which write+commit README.md DIRECTLY into the project repo. It runs LAST
    # (after every task is implemented + verified), so the README reflects the
    # repo's actual final state.
    transitions:
      - to: "5_test"

  # ─── Run unit tests (deterministic gate, AFTER the verifier) ───
  # Runs pytest over the consolidated repo and writes test_report.json. Always
  # succeeds as a step; the outcome is captured for 5_review to fold into its
  # verdict, so the verifier's semantic issues AND test failures loop back to PM
  # together in one change-set.
  - id: "5_test"
    step_type: "tool"
    tool_name: "run_tests"
    # Claim timeout: must exceed run_tests' worst case (venv + pip + project
    # deps + the 180s pytest wall ≈ 900s) so a slow-but-alive run isn't
    # reclaimed mid-flight by a concurrent driver — only a dead claim recovers.
    timeout_seconds: 1200
    tool_params:
      out_dir: "$STEP_DIR"
    transitions:
      # Engine-agnostic base: goes straight to knowledge. The `game_harness`
      # addon splices the compile/play-test gate (5_compile) in HERE, on this
      # edge (anchor: post_verify_tests), for game projects.
      - to: "5_knowledge"

  # ─── Cross-run knowledge transfer (deterministic, NEVER fails) ───
  # Distills this run's review-verified knowledge (approved architecture +
  # what the final verifier confirmed works + the issues it flagged) into a
  # git-IGNORED `<repo>/.aitelier/knowledge.md`, so the NEXT DPE run on the same
  # repo starts with the prior run's wisdom. Not committed (added to
  # .git/info/exclude), safe to `rm` if stale. Runs on every final-verify pass
  # (incl. goal-loop iterations); each rewrites this project's own section.
  - id: "5_knowledge"
    step_type: "tool"
    tool_name: "knowledge_sync"
    timeout_seconds: 300
    tool_params:
      out_dir: "$STEP_DIR"
    transitions:
      - to: "5_review"

  - id: "5_review"
    step_type: "agent"
    agent_config: "final_verifier_reviewer"
    context:
      - source: { from: "repository", mode: "tool" }
      - source: { step: "5" }
      - source: { step: "5_test" }
      # { step: "5_compile" } is added by the game_harness addon (add_context),
      # so the base reviewer stays engine-agnostic.
    output:
      mode: "content"
      fixed:
        verdict: { file: "review_verdict.json", on_exists: "new", format: '{"passed": bool, "feedback": str, "suggestions": [str, ...]}' }
    validation:
      - files: ["review_verdict.json"]
        tool: "json_schema"
        inline_schema:
          type: object
          required: [passed]
          properties:
            passed: { type: boolean }
            feedback: { type: string }
    transitions:
      - to: null    # end — graph terminates here
        match: { from_file: "review_verdict.json", field: "passed", value: true }
      # ── GOAL-LOOP (configurable) ───────────────────────────────────────────
      # When final verification fails, loop back and re-do the project WITH the
      # verifier's feedback (goal-seeking retry), instead of just re-running the
      # verifier on unchanged code. Skillflow re-runs the whole subgraph from the
      # target down to here. Tune to taste:
      #   to:        loop target — "3" (PM: re-plan tasks + re-implement, DEFAULT;
      #              keeps research+architecture, fixes missing/buggy features),
      #              "2" (Architect: redesign — more thorough, more expensive,
      #              use when misses are structural),
      #              "1" (Researcher: rarely the cause of a goal miss).
      #   max_loop:  max goal-loop iterations before the run ends as failed.
      #   feedback:  injects the final verifier's reasons into the target step.
      # To DISABLE the goal-loop: set `to: "5"` (re-verify only) or delete this edge.
      - to: "3"
        match: { from_file: "review_verdict.json", field: "passed", value: false }
        max_loop: 2
