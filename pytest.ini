# pytest.ini
[pytest]
testpaths = tests
asyncio_mode = auto
# Real-network integration tests (live SearXNG / pypi / httpbin) are
# non-deterministic — deselected by default so the suite is reproducible.
# Run them explicitly with:  pytest -m network
addopts = -m "not network"
markers =
    network: test hits live external services (real URLs / SearXNG); opt-in.
filterwarnings =
    # 忽略来自 litellm 内部针对 event loop 的弃用警告
    ignore:There is no current event loop:DeprecationWarning:litellm.*
