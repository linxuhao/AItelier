# configs/addons/game_harness.yaml — Godot game-harness addon overlay.
#
# Injected into the engine-agnostic DPE base (dpe_default.yaml) at registration
# time via skillflow.compose (see api/dependencies.py). Keeps game/engine
# concerns OUT of the base pipeline: to target a different engine (a web
# harness, a mobile harness) you write a sibling addon and swap the base's
# `overlays:` list — you never fork the DPE graph.
#
# What it adds: a deterministic Godot gate after the test gate that
#   1. parse-checks every GDScript + scene in the repo (import), then
#   2. if that passed, headless-play-tests the main scene, capturing runtime
#      errors (with res:// file+line) AND a live snapshot of scene-tree state.
# Both land in compile_report.json / playtest_report.json, folded into 5_review
# so parse + runtime failures loop back through the goal-loop. No-ops (passes)
# for non-Godot projects, so applying it unconditionally is safe.

name: "game_harness"
# Base binding: this addon targets dpe_default_v2's anchors, so it is specific to
# that base (not generic). `alias` names the blessed base+THIS-addon combo, which
# core/addon_registry.py registers at boot as a runnable config. Multi-addon runs
# (run(base, [game_harness, ...])) get an emergent name instead.
base: "dpe_default_v2"
alias: "dpe_game"
description: "Godot compile + headless play-test gate for game projects."
whenToUse: "Building a Godot game — adds the parse gate + runtime play-test that captures errors and live scene state."

overlay:
  # ── STEPS + TOOLS ──────────────────────────────────────────────────────────
  # 1. Mechanical (tool) channel: scaffold a Godot .gitignore into the repo right
  #    after it's created — guaranteed, doesn't depend on the LLM. Asset lives at
  #    configs/addons/game_harness/assets/dot_gitignore.
  - insert_after: "@post_repo_setup"
    steps:
      - id: "gh_scaffold"
        step_type: "tool"
        tool_name: "scaffold"
        timeout_seconds: 60
        tool_params:
          addon: "game_harness"

  # 2. Splice the Godot compile + headless play-test gate onto the edge out of
  #    the test gate.
  - insert_after: "@post_verify_tests"
    steps:
      - id: "5_compile"
        step_type: "tool"
        tool_name: "godot_compile"
        timeout_seconds: 300
        tool_params:
          out_dir: "$STEP_DIR"
        # no transitions → auto-wired to 5_test's original target (5_knowledge)

  # ── CONTEXT ────────────────────────────────────────────────────────────────
  # 3. Let the final verifier read the gate's reports.
  - add_context: "@verifier_review"
    source: { step: "5_compile" }

  # ── PROMPT FRAGMENTS (add_template) ────────────────────────────────────────
  # 4. Godot conventions reach the architect/implementer/verifier prompts ONLY
  #    when this addon is applied — the base templates stay engine-agnostic.
  - add_template: "@architect"
    fragment: "game_harness/architect.md"
  - add_template: "@implementer"
    fragment: "game_harness/implementer.md"
  - add_template: "@verifier_review"
    fragment: "game_harness/verifier.md"
