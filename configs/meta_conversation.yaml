# configs/meta_conversation.yaml
# Requirements-gathering conversation as a deterministic skillflow graph.
#
# The butler (core/meta_agent.py) drives this run synchronously and relays the
# gather step's question / brief into the chat. The conversation transcript
# lives in the workspace file `meta/conversation.md` (maintained by the butler).
# The gather step writes a single `gather_state.json`:
#   - {"need_input": true,  "question": "...", "analysis_so_far": "..."}  (ask)
#   - {"need_input": false, "brief": { ...incl. user_stories... }}        (finalize)
# Looping is driven at runtime by reject_checkpoint(redirect_to="gather")
# (see core/meta_run.py). On checkpoint approval the run advances into the
# `finalize` tool step, which emits the project artifacts (project_brief.md,
# spec.md, step1_goals.json); the node_reached end-condition then completes the
# run, after which the butler triggers the DPE pipeline (core/project_submit.py).

name: "meta_conversation"
description: "Project requirements gathering → brief (butler triggers DPE on approval)"

# Host (AItelier) metadata — read by core/config_registry.py, ignored by skillflow.
x-aitelier:
  label: "Requirements Conversation"
  scheduler_owned: false          # driven imperatively by the butler, not the poller
  output_step: "gather"
  checkpoint_kinds:
    gather: conversational        # a chat turn, not a file-diff review

begin: "intent_detect"

# Reaching the `finalize` tool step (which emits the project artifacts) completes
# the run. A tool/gate transition `to: null` alone would fail the run ("no
# matching transition"); the node_reached end-condition is the supported way to
# terminate cleanly — the same pattern DPE uses to end at 5_review.
end_conditions:
  combinator: or
  conditions:
    - type: node_reached
      node: "finalize"
      result: "completed"
      require_completed: true   # the emit tool must actually run before completing

steps:
  - id: "intent_detect"
    step_type: "agent"
    agent_config: "intent_detector"
    context:
      - source: { from: "workspace", path: "meta/conversation.md" }
    output:
      mode: "content"
      fixed:
        result: "intent_result.json"
    validation:
      - files: ["intent_result.json"]
        tool: "json_schema"
        inline_schema:
          type: object
          required: [intent]
          properties:
            intent: { type: string, enum: [new_project, existing_code, rejected] }
    transitions:
      - to: "gather"
        match: { from_file: "intent_result.json", field: "intent", value: "new_project" }
      - to: "gather"
        match: { from_file: "intent_result.json", field: "intent", value: "existing_code" }
      - to: null          # not a software project — butler just chats
        match: { from_file: "intent_result.json", field: "intent", value: "rejected" }

  - id: "gather"
    step_type: "agent"
    agent_config: "meta_conversation_agent"
    checkpoint: true
    checkpoint_label: "Project conversation"
    context:
      - source: { from: "workspace", path: "meta/conversation.md" }
      # Read tools over the code repo (best-effort; meaningful for existing
      # repos). MUST stay mode:"tool" — inline mode would concatenate the whole
      # repo into the prompt (the ~4 MB intent_detect incident); skillflow
      # >=1.5.20 refuses pathless inline outright, so this would inject nothing
      # anyway. The old pathless-inline form only ever "worked" because the
      # resolver read the wrong (near-empty) root.
      - source: { from: "repository", mode: "tool" }
    output:
      mode: "content"
      fixed:
        gather_state: "gather_state.json"
    validation:
      - files: ["gather_state.json"]
        tool: "user_stories_present"       # ≥1 user story required to finalize
    transitions:
      # On approval, route to a terminal gate. (A checkpoint step cannot
      # transition directly `to: null` — skillflow fails it before pausing;
      # bridging through a non-checkpoint gate is the supported pattern.)
      - to: "finalize"
        match: { from: "checkpoint", value: "approved" }

  - id: "finalize"
    step_type: "tool"
    tool_name: "emit_project_artifacts"
    tool_params:
      out_dir: "$STEP_DIR"                  # step1_goals.json lands here (DPE cross-config source)
    transitions:
      - to: null                            # emits artifacts; node_reached end-condition completes the run
