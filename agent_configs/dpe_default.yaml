final_verifier:
  model: "deepseek/deepseek-v4-pro"
  temperature: 0.2
  template: "step5_verifier.md"
  tools: ["list_tree"]
  max_output_tokens: 16384
  max_tool_turns: 100
  native_tool_calling: true
  # Was false: native exhaustion then hard-failed the whole run. Enable JSON
  # fallback so the final verifier degrades gracefully like every other step.
  fallback_to_json_mode: true
  thinking:
    enable: true

