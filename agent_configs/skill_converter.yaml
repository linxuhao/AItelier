# agent_configs/skill_converter.yaml
# Roles for the skill_converter pipeline (skillflow's converter graph, run in
# AItelier framework mode). skillflow ships these agents as model:"host"
# (runner-mode); here they get real models + templates so AItelier's framework
# runner drives them like any DPE role. Referenced by skill_converter.yaml's
# step.agent_config.

skill_analyst:
  model: "deepseek/deepseek-v4-flash"
  temperature: 0.2
  template: "skill_convert_analyze.md"
  tools: ["read_file"]
  max_output_tokens: 8192
  native_tool_calling: true
  fallback_to_json_mode: true

graph_designer:
  model: "deepseek/deepseek-v4-flash"
  temperature: 0.2
  template: "skill_convert_design.md"
  tools: ["read_file"]
  max_output_tokens: 16384
  native_tool_calling: true
  fallback_to_json_mode: true

design_explainer:
  model: "deepseek/deepseek-v4-flash"
  temperature: 0.3
  template: "skill_convert_explain.md"
  tools: ["read_file"]
  max_output_tokens: 8192
  native_tool_calling: true
  fallback_to_json_mode: true

graph_fixer:
  model: "deepseek/deepseek-v4-flash"
  temperature: 0.2
  template: "skill_convert_fix.md"
  tools: ["read_file"]
  max_output_tokens: 16384
  native_tool_calling: true
  fallback_to_json_mode: true
